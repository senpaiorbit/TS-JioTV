<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Channel Details</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    .gradient-text {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 50%, #4facfe 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .time-slot { transition: all 0.3s ease; }
    .time-slot:hover { transform: translateY(-2px); }
    .time-slot.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .date-btn.active { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
    .player-wrapper {
      position: relative; width: 100%; padding-bottom: 56.25%;
      background: #000; border-radius: 1rem; overflow: hidden;
    }
    .player-wrapper video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    .back-btn { transition: transform 0.3s ease; }
    .back-btn:hover { transform: translateX(-4px); }
    .error-msg { animation: fadeIn 0.5s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
  <div class="max-w-4xl mx-auto px-4 py-8">
    <div data-aos="fade-right">
      <a href="index.html" class="back-btn inline-flex items-center gap-2 text-gray-400 hover:text-white mb-6 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24">
          <path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8l8 8l1.41-1.41L7.83 13H20v-2z"/>
        </svg>
        Back to Channels
      </a>
    </div>
    <div data-aos="fade-up" data-aos-delay="100">
      <h1 id="channel-title" class="text-3xl md:text-4xl font-bold gradient-text mb-6"></h1>
    </div>
    <div data-aos="fade-up" data-aos-delay="200">
      <div class="player-wrapper shadow-2xl mb-8">
        <video id="player" controls playsinline></video>
      </div>
      <div id="error-container" class="hidden mb-6">
        <div class="error-msg bg-red-900/30 border border-red-700 rounded-xl p-4 flex items-center gap-3">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-red-400 flex-shrink-0" viewBox="0 0 24 24">
            <path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10s10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
          </svg>
          <span id="error-text" class="text-red-300"></span>
        </div>
      </div>
      <div id="loading" class="hidden mb-6">
        <div class="bg-gray-800/50 rounded-xl p-4 flex items-center gap-3">
          <svg class="animate-spin h-5 w-5 text-purple-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
          </svg>
          <span class="text-gray-400">Loading stream...</span>
        </div>
      </div>
    </div>
    <div id="catchup-section" class="hidden" data-aos="fade-up" data-aos-delay="300">
      <div class="bg-gray-800/50 rounded-2xl p-6 mb-8">
        <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-purple-400" viewBox="0 0 24 24">
            <path fill="currentColor" d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8s8 3.58 8 8s-3.58 8-8 8zm.5-13H11v6l5.25 3.15l.75-1.23l-4.5-2.67z"/>
          </svg>
          Catchup
        </h2>
        <div class="mb-4">
          <p class="text-gray-400 text-sm mb-3">Select Date</p>
          <div id="date-container" class="flex gap-2 overflow-x-auto pb-2"></div>
        </div>
        <div id="timeslots-container" class="hidden">
          <p class="text-gray-400 text-sm mb-3">Select Time</p>
          <div id="timeslots-grid" class="grid grid-cols-4 md:grid-cols-6 gap-2"></div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
  <script>
    AOS.init({ duration: 600, easing: 'ease-out-cubic', once: true });
    const params = new URLSearchParams(window.location.search);
    const channelId = params.get('id') || '';
    const channelName = params.get('name') || 'Unknown Channel';
    const isCatchup = params.get('catchup') === 'y';
    document.getElementById('channel-title').textContent = decodeURIComponent(channelName);
    document.title = decodeURIComponent(channelName) + ' - JioTV';
    const video = document.getElementById('player');
    const errorContainer = document.getElementById('error-container');
    const errorText = document.getElementById('error-text');
    const loading = document.getElementById('loading');
    const catchupSection = document.getElementById('catchup-section');
    let hls = null;
    let selectedDate = null;
    function showError(msg) { errorText.textContent = msg; errorContainer.classList.remove('hidden'); }
    function hideError() { errorContainer.classList.add('hidden'); }
    function showLoading() { loading.classList.remove('hidden'); }
    function hideLoading() { loading.classList.add('hidden'); }
    function loadStream(url) {
      hideError(); showLoading();
      if (hls) { hls.destroy(); hls = null; }
      video.src = '';
      if (Hls.isSupported()) {
        hls = new Hls({ maxBufferLength: 30, maxMaxBufferLength: 60 });
        hls.loadSource(url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, function () { hideLoading(); video.play().catch(function () {}); });
        hls.on(Hls.Events.ERROR, function (event, data) {
          if (data.fatal) {
            hideLoading();
            switch (data.type) {
              case Hls.ErrorTypes.NETWORK_ERROR: showError('Network error.'); hls.startLoad(); break;
              case Hls.ErrorTypes.MEDIA_ERROR: showError('Media error. Attempting recovery...'); hls.recoverMediaError(); break;
              default: showError('Stream failed to load.'); hls.destroy(); break;
            }
          }
        });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
        video.addEventListener('loadedmetadata', function () { hideLoading(); video.play().catch(function () {}); }, { once: true });
        video.addEventListener('error', function () { hideLoading(); showError('Failed to load stream.'); }, { once: true });
      } else {
        hideLoading(); showError('HLS is not supported in your browser.');
      }
    }
    function loadLive() { loadStream('/live?id=' + encodeURIComponent(channelId) + '&e=.m3u8'); }
    function loadCatchup(srno, begin, end) { loadStream('/cpapi?id=' + encodeURIComponent(channelId) + '&srno=' + encodeURIComponent(srno) + '&begin=' + encodeURIComponent(begin) + '&end=' + encodeURIComponent(end) + '&e=.m3u8'); }
    function getDateStr(date) { return date.toISOString().split('T')[0]; }
    function formatDate(date) {
      var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return days[date.getDay()] + ', ' + months[date.getMonth()] + ' ' + date.getDate();
    }
    function isToday(date) { return getDateStr(date) === getDateStr(new Date()); }
    function buildDateButtons() {
      var container = document.getElementById('date-container');
      var today = new Date();
      for (var i = 0; i < 7; i++) {
        var d = new Date(today); d.setDate(today.getDate() - i);
        var btn = document.createElement('button');
        btn.className = 'date-btn flex-shrink-0 px-4 py-2 rounded-xl text-sm font-medium border border-gray-700 hover:border-purple-500 transition-all';
        if (i === 0) btn.classList.add('active', 'border-transparent');
        btn.textContent = isToday(d) ? 'Today' : formatDate(d);
        btn.dataset.date = getDateStr(d);
        btn.addEventListener('click', function () {
          document.querySelectorAll('.date-btn').forEach(function (b) { b.classList.remove('active', 'border-transparent'); b.classList.add('border-gray-700'); });
          this.classList.add('active', 'border-transparent'); this.classList.remove('border-gray-700');
          selectedDate = this.dataset.date; buildTimeSlots(selectedDate);
        });
        container.appendChild(btn);
      }
    }
    function buildTimeSlots(dateStr) {
      var container = document.getElementById('timeslots-container');
      var grid = document.getElementById('timeslots-grid');
      container.classList.remove('hidden'); grid.innerHTML = '';
      var hours = [6,6.5,7,7.5,8,8.5,9,9.5,10,10.5,11,11.5,12,12.5,13,13.5,14,14.5,15,15.5,16,16.5,17,17.5,18,18.5,19,19.5,20,20.5,21,21.5,22,22.5,23,23.5];
      hours.forEach(function (h) {
        var hour = Math.floor(h); var min = (h % 1) * 60;
        var pad = function (n) { return n < 10 ? '0' + n : '' + n; };
        var timeStr = pad(hour) + ':' + pad(min);
        var hr = hour * 3600 + min * 60;
        var dt = new Date(dateStr + 'T00:00:00');
        var srno = Math.floor(dt.getTime() / 1000);
        var begin = srno + hr; var end = begin + 1800;
        var btn = document.createElement('button');
        btn.className = 'time-slot px-3 py-2 rounded-xl text-xs md:text-sm font-medium bg-gray-700/50 hover:bg-purple-600/30 border border-gray-600 hover:border-purple-500';
        btn.textContent = timeStr;
        btn.addEventListener('click', function () {
          document.querySelectorAll('.time-slot').forEach(function (b) { b.classList.remove('active', 'border-purple-500'); });
          this.classList.add('active', 'border-purple-500');
          loadCatchup(srno, begin, end);
        });
        grid.appendChild(btn);
      });
    }
    if (!channelId) { showError('No channel ID provided.'); }
    else if (isCatchup) { catchupSection.classList.remove('hidden'); buildDateButtons(); }
    else { loadLive(); }
  </script>
</body>
</html>
